<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAAP Gen AI Image Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .user-info {
            text-align: right;
            margin-bottom: 20px;
        }
        .user-info a {
            color: #4CAF50;
            text-decoration: none;
            margin-left: 10px;
        }
        form {
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
        }
        button {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        #image-output {
            margin-top: 20px;
            text-align: center;
        }
        #generated-image {
            max-width: 100%;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .loading {
            display: none;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="user-info">
            {% if current_user.is_authenticated %}
                Logged in as: {{ current_user.username }}
                <a href="{{ url_for('logout') }}">Logout</a>
            {% else %}
                <a href="{{ url_for('login') }}">Login</a> | <a href="{{ url_for('register') }}">Register</a>
            {% endif %}
        </div>
        <h1>EAAP Gen AI Image Generator</h1>
        <form id="image-form" action="/generate" method="post">
            <textarea name="prompt" placeholder="Enter your image generation prompt here..." required></textarea>
            <button type="submit">Generate Image</button>
        </form>
        <div id="image-output">
            <p class="loading">Generating image...</p>
            <img id="generated-image" src="" alt="Generated Image" style="display: none;">
        </div>
    </div>

    <script>
        const form = document.getElementById('image-form');
        const loading = document.querySelector('.loading');
        const image = document.getElementById('generated-image');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            loading.style.display = 'block';
            image.style.display = 'none';
            image.src = '';

            const formData = new FormData(form);
            fetch('/generate', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                loading.style.display = 'none';
                if (data.image_url) {
                    image.src = data.image_url;
                    image.style.display = 'block';
                } else if (data.error) {
                    alert('Error: ' + data.error);
                }
            })
            .catch(error => {
                loading.style.display = 'none';
                alert('Error: ' + error.message);
            });
        });
    </script>
</body>
</html>
